<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenzie Florist | Premium Floral Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .text-gold { color: #d4af37; }
        .product-card { transition: 0.4s; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; background: #0a0a0a; display: flex; flex-direction: column; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-5px); }
        /* Gambar bisa diklik & ada efek zoom saat hover */
        .img-container { position: relative; cursor: zoom-in; overflow: hidden; }
        .img-container img { transition: 0.5s; }
        .img-container:hover img { transform: scale(1.1); }
        
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
        .pulse-btn { animation: pulse-gold 2s infinite; }
        .ai-assistant { position: fixed; bottom: 25px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        .ai-bubble { background: #d4af37; color: black; padding: 10px 15px; border-radius: 15px 15px 2px 15px; font-size: 10px; font-weight: 700; margin-bottom: 8px; border: 2px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="pb-20">

    <div class="bg-[#0f0f0f] border-b border-gray-900 py-3 px-4 sticky top-0 z-[60]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-gold text-[9px] font-bold tracking-widest">
                <span class="flex h-2 w-2 rounded-full bg-gold animate-ping"></span> ONLINE
            </div>
            <a href="https://wa.me/6281320394039" class="bg-white text-black px-4 py-1.5 rounded-full text-[9px] font-bold uppercase pulse-btn">WhatsApp Admin</a>
        </div>
    </div>

    <header class="py-12 md:py-20 text-center">
        <h1 class="font-luxury text-4xl md:text-8xl text-gold mb-3 uppercase tracking-tighter px-4">KENZIE FLORIST</h1>
        <p class="text-gray-500 tracking-[0.3em] text-[9px] md:text-[11px] uppercase font-semibold italic">Luxury Gifting Experience</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6 min-h-[400px]">
        <div id="main-catalog" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <section class="max-w-6xl mx-auto px-4 mt-20 py-20 border-t border-gray-900">
        <div class="grid md:grid-cols-2 gap-12 items-center text-center md:text-left">
            <div>
                <h3 class="font-luxury text-3xl text-gold mb-4 uppercase tracking-tighter">Workshop Ciomas</h3>
                <p class="text-gray-400 text-xs mb-8">📍 Jl. Raya Laladon (Seberang Ibnu Aqil), Kec. Ciomas, Bogor.</p>
                <a href="https://wa.me/6281320394039" class="bg-white text-black px-10 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-gold transition">Pesan Sekarang</a>
            </div>
            <div class="h-64 md:h-80 rounded-2xl overflow-hidden border border-gold/20 grayscale invert contrast-[1.2]">
                <iframe width="100%" height="100%" frameborder="0" src="https://www.google.com/maps/contrib/104098195255289368862/reviews"></iframe>
            </div>
        </div>
    </section>

    <div class="ai-assistant">
        <div class="ai-bubble">Admin AI: <br>Klik foto untuk zoom ya!</div>
        <a href="https://wa.me/6281320394039" class="bg-[#25d366] p-4 rounded-full shadow-2xl pulse-btn block border-2 border-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
        </a>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTir3BmgGTFKpQHbt3JjcToUTQSkWdCW-DEkAGVFMqC13RpV7c1RkLwh1s3SsExtTf8EGmZ_mB-rddL/pub?output=csv';
        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const lines = data.split('\n');
                const container = document.getElementById('main-catalog');
                let html = '';
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',').map(item => item.trim());
                    // Filter Baris Kosong & Validasi Gambar
                    if (row.length >= 4 && row[3].startsWith('http') && row[1] !== "") {
                        html += `
                            <div class="product-item product-card">
                                <div class="img-container h-48 md:h-80">
                                    <a href="${row[3]}" target="_blank" title="Klik untuk perbesar">
                                        <img src="${row[3]}" class="w-full h-full object-cover">
                                    </a>
                                </div>
                                <div class="p-4 md:p-6 flex-grow flex flex-col justify-between text-center">
                                    <div>
                                        <h4 class="text-white text-[10px] md:text-[11px] uppercase font-semibold mb-1 leading-tight tracking-wider">${row[1]}</h4>
                                        <p class="text-gold font-bold text-xs md:text-sm mb-4 font-luxury italic">Rp ${row[2]}</p>
                                    </div>
                                    <a href="https://wa.me/6281320394039" target="_blank" class="block w-full text-center bg-white text-black py-2 md:py-3 rounded-xl text-[9px] font-bold uppercase tracking-widest hover:bg-gold transition">Order</a>
                                </div>
                            </div>`;
                    }
                }
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }
        window.onload = loadData;
    </script>
</body>
</html>
